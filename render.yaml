# Render Blueprint — deploys the Resume Automation Bot as a Docker web service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: resume-automation-bot
    runtime: docker
    plan: starter          # 'free' also works but sleeps; starter stays warm
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # API keys are entered per-user in the web UI, so none are required here.
      # To run in single-key mode instead, uncomment and set this as a secret:
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
